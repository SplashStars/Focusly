# ─────────────────────────────────────────────────────────────────────────────
# Focusly — GitHub Actions build workflow
# v1.1.0
#
# Triggers:
#   • Push to main → builds debug APK automatically
#   • Manual trigger → choose debug or release APK
#
# Artifacts produced:
#   • focusly-debug-apk   (always) — install directly on phone for testing
#   • focusly-release-apk (manual, release mode) — closest to Play Store build
# ─────────────────────────────────────────────────────────────────────────────

name: Build Focusly APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 2b. Cache Gradle dependencies (avoids Maven Central flakiness) ────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Setup Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      # ── 4. Android licenses ──────────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      # ── 5. Launcher icons ────────────────────────────────────────────────────
      - name: Generate launcher icons
        run: |
          flutter create --org com.example --project-name focusly /tmp/icon_source
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-hdpi    focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-mdpi    focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xhdpi   focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxhdpi  focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxxhdpi focusly/android/app/src/main/res/
          echo "Launcher icons ready."

      # ── 6. Flutter packages ──────────────────────────────────────────────────
      - name: Install Flutter packages
        working-directory: focusly
        run: flutter pub get

      # ── 7a. Build debug APK ──────────────────────────────────────────────────
      - name: Build debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        working-directory: focusly
        run: flutter build apk --debug --verbose

      - name: Upload debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusly-debug-apk
          path: focusly/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── 7b. Build release APK (manual trigger only) ──────────────────────────
      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: focusly
        run: flutter build apk --release --verbose

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusly-release-apk
          path: focusly/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 8. Print result ──────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "======================================="
          echo "  Focusly v$(grep '^version:' focusly/pubspec.yaml | cut -d' ' -f2) build complete!"
          echo "  Download the APK from the Actions tab"
          echo "======================================="
