name: Build Focusly APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Generate default launcher icons
        run: |
          flutter create --org com.example --project-name focusly /tmp/icon_source
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-hdpi focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-mdpi focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xhdpi focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxhdpi focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxxhdpi focusly/android/app/src/main/res/
          echo "Launcher icons ready."

      - name: Install Flutter packages
        working-directory: focusly
        run: flutter pub get

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/focusly-release.keystore
          echo "Keystore decoded: $(ls -lh /tmp/focusly-release.keystore)"

      - name: Build release APKs (split by CPU architecture)
        working-directory: focusly
        env:
          KEYSTORE_FILE: /tmp/focusly-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi --verbose

      - name: Build release AAB (for Google Play Store)
        working-directory: focusly
        env:
          KEYSTORE_FILE: /tmp/focusly-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release --verbose

      - name: Verify outputs exist
        run: |
          echo "=== Release APKs ==="
          ls -lh focusly/build/app/outputs/flutter-apk/app-*-release.apk
          echo "=== Release AAB ==="
          ls -lh focusly/build/app/outputs/bundle/release/app-release.aab

      - name: Upload arm64 APK (install on phone)
        uses: actions/upload-artifact@v4
        with:
          name: focusly-arm64-release
          path: focusly/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload AAB (upload to Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: focusly-play-store-aab
          path: focusly/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
