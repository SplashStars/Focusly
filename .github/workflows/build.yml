name: Build Focusly APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Add Maven Central mirror (fixes 403 from repo.maven.apache.org on GH runners)
        run: |
          mkdir -p ~/.gradle/init.d
          printf 'allprojects {\n  buildscript { repositories { maven { url \'https://repo1.maven.org/maven2/\' } } }\n  repositories { maven { url \'https://repo1.maven.org/maven2/\' } }\n}\n' > ~/.gradle/init.d/maven-mirror.gradle
          cat ~/.gradle/init.d/maven-mirror.gradle

      - name: Setup Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Generate launcher icons
        run: |
          flutter create --org com.example --project-name focusly /tmp/icon_source
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-hdpi    focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-mdpi    focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xhdpi   focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxhdpi  focusly/android/app/src/main/res/
          cp -r /tmp/icon_source/android/app/src/main/res/mipmap-xxxhdpi focusly/android/app/src/main/res/
          echo "Launcher icons ready."

      - name: Install Flutter packages
        working-directory: focusly
        run: flutter pub get

      - name: Build debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        working-directory: focusly
        run: flutter build apk --debug --verbose

      - name: Upload debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusly-debug-apk
          path: focusly/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: focusly
        run: flutter build apk --release --verbose

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusly-release-apk
          path: focusly/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "Build complete! Download APK from the Actions tab."
