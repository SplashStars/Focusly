plugins {
        id "com.android.application"
        id "kotlin-android"
        id "dev.flutter.flutter-gradle-plugin"
}
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
        localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}
def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0.0"
android {
        namespace "com.splashstars.focusly"h
            compileSdk 35
        ndkVersion flutter.ndkVersion
        compileOptions {
                    coreLibraryDesugaringEnabled true
                    sourceCompatibility JavaVersion.VERSION_1_8
                    targetCompatibility JavaVersion.VERSION_1_8
        }
        kotlinOptions { jvmTarget = "1.8" }
        defaultConfig {
                    applicationId "com.splashstars.focusly"
                    minSdk 21
                            targetSdk 35
                                versionCode 2
                    versionName flutterVersionName
                    multiDexEnabled true
        }
        signingConfigs {
                    release {
                                    def keystorePath = System.getenv("KEYSTORE_FILE")
                                    if (keystorePath) {
                                                        storeFile file(keystorePath)
                                                        storePassword System.getenv("STORE_PASSWORD") ?: ""
                                                        keyAlias System.getenv("KEY_ALIAS") ?: ""
                                                        keyPassword System.getenv("KEY_PASSWORD") ?: ""
                                    }
                    }
        }
        buildTypes {
                    debug { signingConfig signingConfigs.debug }
                    release {
                                    def hasKeystore = System.getenv("KEYSTORE_FILE") != null
                                    signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
                                    minifyEnabled true
                                    shrinkResources true
                                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                    }
        }
        lint {
                    checkReleaseBuilds false
                    abortOnError false
        }
}
flutter { source "../.." }
dependencies {
        coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23"
}
