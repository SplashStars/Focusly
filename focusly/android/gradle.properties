# Android Gradle settings for Focusly

# Give Gradle enough memory to build Flutter apps
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Required: makes Flutter packages compatible with modern Android Jetpack libraries
android.useAndroidX=true
android.enableJetifier=true

# Kotlin version (must match what's in settings.gradle)
kotlin.code.style=official

# Speeds up builds — keeps Gradle running in the background between builds
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
